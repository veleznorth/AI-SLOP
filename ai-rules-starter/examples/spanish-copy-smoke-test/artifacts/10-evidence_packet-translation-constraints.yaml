claims_inferred:
  - id: translation_constraints.byte_preservation_rule
    label: INFERENCE_FROM_PATH
    claim: "The safest future regeneration rule is to preserve all commands, paths, filenames, stop labels, AGENTS markers, R1/R2/W, 500/600, and 8%/10%/15% exactly, while translating only surrounding prose."
    basis:
      - "Artifacts 01 and 03 explicitly prohibit translating these token classes."
      - "The rg scans found these token classes across source docs, starter overlay files, and smoke-test artifacts."
  - id: translation_constraints.split_by_token_group
    label: INFERENCE_FROM_PATH
    claim: "A future constraints read should be split by token group if deeper review is needed because matches were returned in more than five files."
    basis:
      - "command:rg -n \"AI_RULES_MANAGED|STOP|stop label|stop labels|R1|R2|\\bW\\b|8%|10%|15%|500|600\" ai-rules-starter --glob '*.md' --glob '*.yaml'"
      - "command:rg -n '`[^`]+`' ai-rules-starter --glob '*.md' --glob '*.yaml'"
      - "command:rg -n \"copy|reading|operational source|source operative|fuente operativa|copia de lectura\" ai-rules-starter ai-rules-starter/examples/spanish-copy-smoke-test/artifacts --glob '*.md' --glob '*.yaml'"
