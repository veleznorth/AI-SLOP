claims_inferred:
  - id: source_inventory.path_based_translation_scope
    label: INFERENCE_FROM_PATH
    claim: "Root docs, docs, and starter-overlay are likely source candidates for a future Spanish reading copy; examples/first-task needs an explicit decision; smoke-test artifacts are context for this smoke test, not automatic translation source."
    basis:
      - "The reading leaf explicitly names these candidate groups and warns not to assume smoke-test artifacts are source documents."
      - "No full-document semantic review was performed."
  - id: source_inventory.future_split_recommended
    label: INFERENCE_FROM_PATH
    claim: "The source set should be split for future reading or regeneration prompts because there are more than 3-5 relevant files."
    basis:
      - "command:find ai-rules-starter -type f \\( -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o -name '*.txt' \\) | sort"
      - "output_summary: 39 candidate files."
claims_unknown:
  - id: source_inventory.translation_inclusion_final_decision
    label: UNKNOWN
    claim: "Which candidate files should be translated in the final implementation remains a downstream decision; this packet only inventories and classifies by group."
  - id: source_inventory.full_content_semantics
    label: UNKNOWN
    claim: "No file was read end to end, so semantic completeness and file-specific translation decisions are unknown."
  - id: source_inventory.context_budget_w
    label: UNKNOWN
    claim: "The operator did not provide context_before/context_after, so W percentage usage is unknown."
sources_reviewed:
  commands:
    - "git status --short"
    - "find ai-rules-starter/examples/spanish-copy-smoke-test/artifacts -type f | sort"
    - "sed -n '1,220p' ai-rules-starter/examples/spanish-copy-smoke-test/artifacts/05-reading_leaf-source-inventory.yaml"
    - "find ai-rules-starter -type f \\( -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o -name '*.txt' \\) | sort"
    - "find ai-rules-starter -type f \\( -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o -name '*.txt' \\) -print0 | xargs -0 wc -l | sort -n"
    - "find ai-rules-starter -maxdepth 3 -type d | sort"
    - "test -f ai-rules-starter/docs/model-guides/gpt-5.5-prompting-for-ai-rules.md; printf 'gpt55_doc_exists=%s\\n' \"$?\""
    - "test -f ai-rules-starter/docs/operator-context-policy.md; printf 'operator_context_policy_exists=%s\\n' \"$?\""
  files_briefly_read:
    - ai-rules-starter/examples/spanish-copy-smoke-test/artifacts/05-reading_leaf-source-inventory.yaml
contradictions: []
risks:
  - id: source_inventory.read_leaf_oversize
    label: READ_LEAF_OVERSIZE
    detail: "The inventory contains 39 candidate files and a 1253-line proxy, exceeding the reading leaf max_total_source_lines_proxy of 80 and the 3-5 file split guidance."
  - id: source_inventory.smoke_artifacts_confusion
    label: SOURCE_SCOPE_CONFUSION
    detail: "Smoke-test artifacts live under ai-rules-starter/ and can be confused with source documents unless treated as context-only."
  - id: source_inventory.flat_artifacts_follow_up
    label: FOLLOW_UP
    detail: "Artifacts should be grouped by role after the smoke test."
context_budget_result:
  status: unknown
  reason: "The operator did not report context_before/context_after; no W percentage was measured or inferred."
  observed_proxy:
    candidate_files: 39
    line_count_proxy_total: 1253
stop_label: READ_LEAF_OVERSIZE
usable_as_prompt_authority:
  status: limited
  usable_for:
    - "Current file inventory under ai-rules-starter/."
    - "Existence of docs/model-guides/gpt-5.5-prompting-for-ai-rules.md."
    - "Existence of docs/operator-context-policy.md."
    - "Path-based grouping and split-risk guidance."
  not_usable_for:
    - "Final translation inclusion decisions."
    - "Semantic correctness of future Spanish copy."
    - "Any W percentage measurement."
