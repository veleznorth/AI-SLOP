    label: VERIFIED_REPO_SCAN
    claim: "A read-only find scan found 39 candidate .md/.yaml/.yml/.txt files under ai-rules-starter/."
    evidence:
      - "command:find ai-rules-starter -type f \\( -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o -name '*.txt' \\) | sort"
      - "output_summary: root_docs=4; docs=8; examples/first-task=1; examples/spanish-copy-smoke-test/artifacts=7; starter-overlay=19."
  - id: source_inventory.line_count_proxy_completed
    label: VERIFIED_REPO_SCAN
    claim: "The line-count proxy for the 39 candidate files is 1253 total lines."
    evidence:
      - "command:find ai-rules-starter -type f \\( -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o -name '*.txt' \\) -print0 | xargs -0 wc -l | sort -n"
      - "output_summary: 1253 total lines."
  - id: source_inventory.directory_groups_confirmed
    label: VERIFIED_REPO_SCAN
    claim: "The repo has the expected source groups: root docs, docs, docs/model-guides, examples, examples/first-task, examples/spanish-copy-smoke-test/artifacts, starter-overlay, starter-overlay/.ai-rules, checklists, prompts, templates, packets, and ledger."
    evidence:
      - "command:find ai-rules-starter -maxdepth 3 -type d | sort"
  - id: source_inventory.gpt55_doc_exists
    label: VERIFIED_REPO_SCAN
    claim: "ai-rules-starter/docs/model-guides/gpt-5.5-prompting-for-ai-rules.md exists."
    evidence:
      - "command:test -f ai-rules-starter/docs/model-guides/gpt-5.5-prompting-for-ai-rules.md; printf 'gpt55_doc_exists=%s\\n' \"$?\""
      - "output_summary: gpt55_doc_exists=0."
  - id: source_inventory.operator_context_policy_exists
    label: VERIFIED_REPO_SCAN
    claim: "ai-rules-starter/docs/operator-context-policy.md exists."
