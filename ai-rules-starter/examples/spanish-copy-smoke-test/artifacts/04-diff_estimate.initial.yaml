risk_factors:
  - id: source_inventory_unknown
    impact: El numero real de archivos fuente puede superar la estimacion.
    mitigation: Inventariar `ai-rules-starter/` antes de implementar y reclasificar si high excede 600.
  - id: marker_preservation
    impact: Markers gestionados deben quedar byte-for-byte intactos.
    mitigation: Identificar markers antes de traducir y revisarlos despues.
  - id: protected_token_translation
    impact: Comandos, rutas, stop labels, nombres de archivos y valores tecnicos no deben traducirse.
    mitigation: Mantener lista de tokens protegidos durante la traduccion.
  - id: operational_source_confusion
    impact: La copia espanola podria confundirse con fuente operativa.
    mitigation: Incluir aviso explicito de copia de lectura en cada archivo espanol.
split_recommendation:
